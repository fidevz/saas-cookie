# =============================================================================
# PRODUCTION ONLY — This file is a reference for local development and CI.
# Production is deployed via Kamal (see deploy/config/deploy.yml).
# Do NOT run `docker compose up` locally for development.
# Local development uses native tools: uv, npm, PostgreSQL, Redis directly.
# See README.md → Quick Start for local dev instructions.
# =============================================================================

networks:
  # Public-facing services (frontend, backend) receive external traffic via kamal-proxy.
  public:
    driver: bridge
  # Internal services (db, redis, minio) are NOT reachable from the host.
  # Only containers on this network can talk to them.
  internal:
    driver: bridge
    internal: true

services:

  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
    restart: unless-stopped
    networks:
      - public
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ─── Backend (API) ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uv run uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --workers 2
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      BASE_DOMAIN: ${BASE_DOMAIN}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      SENTRY_DSN: ${SENTRY_DSN}
      FEATURE_TEAMS: ${FEATURE_TEAMS}
      FEATURE_BILLING: ${FEATURE_BILLING}
      FEATURE_NOTIFICATIONS: ${FEATURE_NOTIFICATIONS}
      APP_NAME: ${APP_NAME}
      ADMIN_URL: ${ADMIN_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
      USE_S3: "True"
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_STORAGE_BUCKET_NAME: ${MINIO_BUCKET:-media}
      AWS_S3_ENDPOINT_URL: http://minio:9000
    networks:
      - public
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: localhost", "http://127.0.0.1:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ─── Celery Worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uv run celery -A config worker -l info --concurrency 2
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      SENTRY_DSN: ${SENTRY_DSN}
      FEATURE_TEAMS: ${FEATURE_TEAMS}
      FEATURE_BILLING: ${FEATURE_BILLING}
      FEATURE_NOTIFICATIONS: ${FEATURE_NOTIFICATIONS}
      USE_S3: "True"
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_STORAGE_BUCKET_NAME: ${MINIO_BUCKET:-media}
      AWS_S3_ENDPOINT_URL: http://minio:9000
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ─── Celery Beat (scheduled tasks) ─────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uv run celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SENTRY_DSN: ${SENTRY_DSN}
      FEATURE_TEAMS: ${FEATURE_TEAMS}
      FEATURE_BILLING: ${FEATURE_BILLING}
      FEATURE_NOTIFICATIONS: ${FEATURE_NOTIFICATIONS}
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saas_boilerplate}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No ports: — PostgreSQL is only reachable from the internal Docker network.
    # For admin access in production use: ssh -L 5432:localhost:5432 user@server
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-saas_boilerplate}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # REDIS_PASSWORD is required — set it in .env alongside REDIS_URL.
    # REDIS_URL must include the password: redis://:password@redis:6379/0
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    # No ports: — Redis is only reachable from the internal Docker network.
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ─── MinIO (S3-compatible file storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    # No ports: — MinIO is accessed only from the internal Docker network.
    # S3 API:     https://storage.yourdomain.com  → port 9000 (internal)
    # Console:    https://storage-ui.yourdomain.com → port 9001 (internal)
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ─── Database Backup ────────────────────────────────────────────────────────
  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saas_boilerplate}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      R2_BUCKET: ${R2_BUCKET:?R2_BUCKET is required}
      # rclone picks these up automatically for the "r2" remote
      RCLONE_CONFIG_R2_TYPE: s3
      RCLONE_CONFIG_R2_PROVIDER: Cloudflare
      RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY:?R2_ACCESS_KEY is required}
      RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${R2_SECRET_KEY:?R2_SECRET_KEY is required}
      RCLONE_CONFIG_R2_ENDPOINT: ${R2_ENDPOINT:?R2_ENDPOINT is required}
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ─── MinIO bucket init (runs once, then exits) ─────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${MINIO_BUCKET:-media};
      echo 'MinIO bucket ready (private — access via pre-signed URLs).';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-media}
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  minio_data:
